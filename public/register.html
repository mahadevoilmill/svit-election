<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVIT Election - Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .register-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 60px 40px;
      width: 100%;
      max-width: 480px;
      animation: slideUp 0.6s ease-out;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .register-header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .register-header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #333;
      margin-bottom: 10px;
    }
    
    .register-header p {
      color: #999;
      font-size: 14px;
      margin: 0;
    }
    
    .form-group {
      margin-bottom: 25px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }
    
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.3s ease;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .btn-register {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    
    .btn-register:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }
    
    .btn-register:active {
      transform: translateY(0);
    }
    
    .btn-register:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .error-message {
      display: none;
      background: #fee;
      color: #c33;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 4px solid #c33;
      font-size: 14px;
      animation: shake 0.3s ease;
    }
    
    .success-message {
      display: none;
      background: #efe;
      color: #3c3;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 4px solid #3c3;
      font-size: 14px;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    .link-bottom {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }
    
    .link-bottom a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }
    
    .link-bottom a:hover {
      text-decoration: underline;
    }
    
    .password-strength {
      font-size: 12px;
      margin-top: 5px;
      padding: 8px;
      border-radius: 6px;
      display: none;
    }
    
    .strength-weak {
      background: #fdd;
      color: #d33;
    }
    
    .strength-medium {
      background: #fd9;
      color: #aa5;
    }
    
    .strength-strong {
      background: #dfd;
      color: #3a3;
    }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="register-header">
      <h1>Create Account</h1>
      <p>Register to access SVIT Election System</p>
    </div>
    
    <div class="error-message" id="errorMsg"></div>
    <div class="success-message" id="successMsg"></div>
    
    <div class="form-group">
      <label for="username">Username (ID)</label>
      <input type="text" id="username" placeholder="Enter username" 
             autocomplete="off" onkeypress="handleKeyPress(event)">
    </div>
    
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" 
             autocomplete="off" oninput="checkPasswordStrength()">
      <div class="password-strength" id="strengthIndicator"></div>
    </div>
    
    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Confirm password" 
             autocomplete="off" onkeypress="handleKeyPress(event)">
    </div>
    
    <button class="btn-register" onclick="register()" id="registerBtn">Create Account</button>
    
    <div class="link-bottom">
      <a href="deshboard.html">🏠 Dashboard</a> &nbsp;|&nbsp;
      Already have an account? <a onclick="goToLogin()">Login</a>
    </div>
  </div>

  <script>
    function goToLogin() {
      window.location = 'index.html';
    }
    
    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        register();
      }
    }
    
    function checkPasswordStrength() {
      const password = document.getElementById('password').value;
      const indicator = document.getElementById('strengthIndicator');
      
      if (!password) {
        indicator.style.display = 'none';
        return;
      }
      
      indicator.style.display = 'block';
      
      let strength = 0;
      if (password.length >= 8) strength++;
      if (password.length >= 12) strength++;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
      if (/[0-9]/.test(password)) strength++;
      if (/[^a-zA-Z0-9]/.test(password)) strength++;
      
      if (strength <= 2) {
        indicator.className = 'password-strength strength-weak';
        indicator.textContent = '⚠️ Weak password - Use mix of upper, lower, numbers, symbols';
      } else if (strength <= 3) {
        indicator.className = 'password-strength strength-medium';
        indicator.textContent = '⚡ Medium strength - Good but add more variety';
      } else {
        indicator.className = 'password-strength strength-strong';
        indicator.textContent = '✅ Strong password - Good!';
      }
    }
    
    async function register() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      const registerBtn = document.getElementById('registerBtn');
      
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
      
      if (!username || !password || !confirmPassword) {
        errorMsg.textContent = 'Please fill all fields';
        errorMsg.style.display = 'block';
        return;
      }
      
      if (username.length < 3) {
        errorMsg.textContent = 'Username must be at least 3 characters';
        errorMsg.style.display = 'block';
        return;
      }
      
      if (password.length < 6) {
        errorMsg.textContent = 'Password must be at least 6 characters';
        errorMsg.style.display = 'block';
        return;
      }
      
      if (password !== confirmPassword) {
        errorMsg.textContent = 'Passwords do not match';
        errorMsg.style.display = 'block';
        return;
      }
      
      registerBtn.disabled = true;
      registerBtn.textContent = 'Creating Account...';
      
      try {
        const response = await fetch(window.location.origin + '/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });
        
        const data = await parseJsonResponse(response);
        
        if (response.ok) {
          successMsg.textContent = '✅ Account created successfully! Redirecting to login...';
          successMsg.style.display = 'block';
          setTimeout(() => {
            window.location = 'index.html';
          }, 2000);
        } else {
          errorMsg.textContent = data.error || 'Registration failed';
          errorMsg.style.display = 'block';
          registerBtn.disabled = false;
          registerBtn.textContent = 'Create Account';
        }
      } catch (error) {
        console.error('Registration error:', error);
        errorMsg.textContent = 'Connection error: ' + error.message;
        errorMsg.style.display = 'block';
        registerBtn.disabled = false;
        registerBtn.textContent = 'Create Account';
      }
    }

    async function parseJsonResponse(response) {
      const contentType = response.headers.get('content-type') || '';
      const text = await response.text();

      if (!text) {
        throw new Error(`Empty response body (${response.status} ${response.statusText})`);
      }

      if (contentType.includes('application/json')) {
        try {
          return JSON.parse(text);
        } catch (err) {
          throw new Error(`Invalid JSON response: ${text}`);
        }
      }

      try {
        return JSON.parse(text);
      } catch (err) {
        throw new Error(`Unexpected response type: ${contentType || 'unknown'} (${response.status} ${response.statusText}) - ${text}`);
      }
    }
  </script>
</body>
</html>
