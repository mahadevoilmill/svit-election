<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVIT Election - User Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    body { background: #f0f2f5; font-family: 'Inter', sans-serif; color: #334155; }
    .header { background: var(--primary-gradient); color: white; padding: 40px 0 100px; margin-bottom: -70px; }
    .card { border: none; border-radius: 16px; box-shadow: 0 4px 25px rgba(0, 0, 0, 0.05); overflow: hidden; margin-bottom: 24px; }
    .form-control-custom { border-radius: 10px; border: 2px solid #f1f5f9; padding: 12px 16px; }
    .btn-indigo { background: var(--primary-gradient); color: white; border: none; border-radius: 10px; padding: 12px 24px; font-weight: 600; }
    .user-item { padding: 15px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
    .user-avatar { width: 40px; height: 40px; border-radius: 10px; margin-right: 15px; }
  </style>
</head>
<body>

<div class="header">
  <div class="container d-flex justify-content-between align-items-center">
    <div>
      <h1 class="mb-0 fw-bold"><i class="fas fa-users-cog"></i> User Management</h1>
      <p class="mb-0 opacity-75">Admin Control Panel</p>
    </div>
    <div class="d-flex gap-2">
      <a href="authority.html" class="btn btn-light text-dark admin-only"><i class="fas fa-user-shield"></i> Authority</a>
      <a href="deshboard.html" class="btn btn-light text-primary"><i class="fas fa-home"></i> Dashboard</a>
      <button onclick="logout()" class="btn btn-danger"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </div>
</div>

<div class="container" style="margin-top: -60px;">
  <div class="row">
    <div class="col-md-4">
      <div class="card p-4">
        <h5 class="fw-bold mb-4">Create New User</h5>
        <div class="mb-3">
          <label class="form-label small fw-bold text-muted">Username</label>
          <input type="text" id="newUsername" class="form-control form-control-custom" placeholder="Enter username">
        </div>
        <div class="mb-3">
          <label class="form-label small fw-bold text-muted">Password</label>
          <input type="password" id="newPassword" class="form-control form-control-custom" placeholder="Enter password">
        </div>
        <div class="mb-4">
          <label class="form-label small fw-bold text-muted">Role</label>
          <select id="newRole" class="form-select form-control-custom">
            <option value="dashboard">Dashboard</option>
            <option value="member">Member</option>
            <option value="data_entry">Data Entry</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <button onclick="createUser()" class="btn btn-indigo w-100">Create Account</button>
        <div id="msg" class="mt-3 text-center"></div>
      </div>
    </div>
    <div class="col-md-8">
      <div class="card">
        <div class="card-header bg-white border-bottom p-4">
          <h5 class="fw-bold mb-0">System Users</h5>
        </div>
        <div id="userList" class="p-0"></div>
      </div>
    </div>
  </div>
</div>

<!-- Edit User Modal -->
<div class="modal fade" id="editUserModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Edit User</h5></div>
      <div class="modal-body">
        <input type="text" id="editUsername" class="form-control mb-3" placeholder="Username">
        <input type="password" id="editPassword" class="form-control mb-3" placeholder="New Password (optional)">
        <label class="form-label small fw-bold text-muted mb-1">Role</label>
        <select id="editRole" class="form-select form-control-custom">
          <option value="dashboard">Dashboard</option>
          <option value="member">Member</option>
          <option value="data_entry">Data Entry</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button class="btn btn-primary" onclick="saveUserChanges()">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<script>
  async function loadUsers() {
    const res = await fetch('/users');
    const users = await res.json();
    const list = document.getElementById('userList');
    list.innerHTML = users.map(u => `
      <div class="user-item">
        <div class="d-flex align-items-center">
          <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(u.username)}&background=random" class="user-avatar">
          <div>
            <div class="fw-bold">${u.username}</div>
            <div class="text-muted small">Registered: ${new Date(u.created_at).toLocaleDateString()}</div>
          </div>
        </div>
        <div class="d-flex align-items-center gap-2">
          <span class="badge ${u.role === 'admin' ? 'bg-danger' : u.role === 'data_entry' ? 'bg-info' : 'bg-secondary'}">${u.role || 'dashboard'}</span>
          <button class="btn btn-sm btn-light text-primary me-2" onclick='editUser(${u.id}, "${u.username.replace(/"/g, '&quot;')}", "${u.role || 'dashboard'}")'><i class="fas fa-edit"></i></button>
          <button class="btn btn-sm btn-light text-danger" onclick="deleteUser(${u.id})"><i class="fas fa-trash"></i></button>
        </div>
      </div>
    `).join('');
  }

  let editingUserId = null;
  function editUser(id, username, role) {
    editingUserId = id;
    document.getElementById('editUsername').value = username;
    document.getElementById('editPassword').value = '';
    document.getElementById('editRole').value = role || 'dashboard';
    new bootstrap.Modal(document.getElementById('editUserModal')).show();
  }

  async function saveUserChanges() {
    const username = document.getElementById('editUsername').value;
    const password = document.getElementById('editPassword').value;
    const role = document.getElementById('editRole').value;
    const res = await fetch(`/users/${editingUserId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, role })
    });
    if (res.ok) {
      bootstrap.Modal.getInstance(document.getElementById('editUserModal')).hide();
      loadUsers();
    }
  }

  async function createUser() {
    const username = document.getElementById('newUsername').value;
    const password = document.getElementById('newPassword').value;
    const role = document.getElementById('newRole').value;
    const res = await fetch('/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password, role })
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('msg').innerHTML = '<span class="text-success small">User created!</span>';
      loadUsers();
    } else {
      document.getElementById('msg').innerHTML = `<span class="text-danger small">${data.error}</span>`;
    }
  }

  async function deleteUser(id) {
    if (!confirm('Are you sure?')) return;
    const res = await fetch(`/users/${id}`, { method: 'DELETE' });
    if (res.ok) loadUsers();
  }

  function logout() { window.location = 'index.html'; }

  function applyRoleVisibility() {
    const role = localStorage.getItem('userRole');
    if (role !== 'admin') {
      document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
    } else {
      document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'inline-block');
    }
    if (role === 'dashboard') {
      document.querySelectorAll('.no-dashboard').forEach(el => el.style.display = 'none');
    } else {
      document.querySelectorAll('.no-dashboard').forEach(el => el.style.display = '');
    }
  }

  window.onload = () => {
    loadUsers();
    applyRoleVisibility();
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
