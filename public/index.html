<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVIT Election - Vote Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .login-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 60px 40px;
      width: 100%;
      max-width: 420px;
      animation: slideUp 0.6s ease-out;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .login-header h1 {
      font-size: 32px;
      font-weight: 700;
      color: #333;
      margin-bottom: 10px;
    }
    
    .login-header p {
      color: #999;
      font-size: 14px;
      margin: 0;
    }
    
    .logo-badge {
      display: inline-block;
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      font-size: 40px;
    }
    
    .form-group {
      margin-bottom: 25px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
      color: #333;
      font-size: 14px;
    }
    
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.3s ease;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }
    
    .btn-login:active {
      transform: translateY(0);
    }
    
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .error-message {
      display: none;
      background: #fee;
      color: #c33;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 4px solid #c33;
      font-size: 14px;
      animation: shake 0.3s ease;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    .password-toggle {
      position: relative;
    }
    
    .toggle-btn {
      position: absolute;
      right: 12px;
      top: 38px;
      background: none;
      border: none;
      cursor: pointer;
      color: #999;
      font-size: 18px;
    }
    
    .toggle-btn:hover {
      color: #667eea;
    }
    
    .footer-links {
      display: flex;
      justify-content: space-between;
      margin-top: 25px;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .footer-links a {
      flex: 1;
      text-align: center;
      color: #667eea;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s ease;
      padding: 8px;
      border-radius: 6px;
    }
    
    .footer-links a:hover {
      background: #f0f0f0;
      color: #764ba2;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="logo-badge">🗳️</div>
      <h1>SVIT Election</h1>
      <p>Secure Vote Management System</p>
    </div>
    
    <div class="error-message" id="errorMsg"></div>
    
    <div class="form-group">
      <label for="username">ID</label>
      <div class="password-toggle">
        <input type="text" id="username" placeholder="Enter your ID" 
               autocomplete="off" onkeypress="handleKeyPress(event)">
      </div>
    </div>
    
    <div class="form-group">
      <label for="password">Password</label>
      <div class="password-toggle">
        <input type="password" id="password" placeholder="Enter your password" 
               autocomplete="off" onkeypress="handleKeyPress(event)">
        <button class="toggle-btn" onclick="togglePassword()" type="button">👁️</button>
      </div>
    </div>
    
    <button class="btn-login" onclick="login()" id="loginBtn">Login</button>
    
    <div class="footer-links" style="justify-content: center;">
      <a href="reset.html" style="flex: 0 1 auto;">🔑 Forgot Password</a>
    </div>
  </div>

  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      if (input.type === 'password') {
        input.type = 'text';
      } else {
        input.type = 'password';
      }
    }
    
    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        login();
      }
    }
    
    async function parseJsonResponse(response) {
      const contentType = response.headers.get('content-type') || '';
      const text = await response.text();

      if (!text) {
        throw new Error(`Empty response body (${response.status} ${response.statusText})`);
      }

      if (contentType.includes('application/json')) {
        try {
          return JSON.parse(text);
        } catch (err) {
          throw new Error(`Invalid JSON response: ${text}`);
        }
      }

      try {
        return JSON.parse(text);
      } catch (err) {
        throw new Error(`Unexpected response type: ${contentType || 'unknown'} (${response.status} ${response.statusText}) - ${text}`);
      }
    }

    async function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      const loginBtn = document.getElementById('loginBtn');
      
      if (!username || !password) {
        errorMsg.textContent = 'Please enter your ID and password';
        errorMsg.style.display = 'block';
        return;
      }
      
      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';
      
      try {
        console.log('Attempting login with:', { username, password });
        
        const apiUrl = window.location.origin + '/login';
        console.log('API URL:', apiUrl);
        
        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        console.log('Response status:', response.status);
        const data = await parseJsonResponse(response);
        console.log('Response data:', data);

        if (response.ok && data.success) {
          errorMsg.style.display = 'none';
          localStorage.setItem('userRole', data.role || 'user');
          localStorage.setItem('username', data.username || username);
          window.location = 'deshboard.html';
        } else {
          errorMsg.textContent = 'Incorrect ID or password. Please try again.';
          errorMsg.style.display = 'block';
          loginBtn.disabled = false;
          loginBtn.textContent = 'Login';
        }
      } catch (error) {
        console.error('Login error:', error);
        errorMsg.textContent = 'Connection error: ' + error.message;
        errorMsg.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
    }
    
    // Focus on username input when page loads
    window.addEventListener('load', () => {
      document.getElementById('username').focus();
    });
  </script>
</body>
</html>
